name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$TAG\"/" src-tauri/tauri.conf.json

      - name: Build
        run: npm run tauri:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign & repackage DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          ENTITLEMENTS="src-tauri/entitlements.mac.plist"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "DMG: $DMG"

          # DMG에서 .app 추출 (Tauri가 빌드 후 .app을 삭제하므로)
          MOUNT_DIR=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -noverify
          APP_SRC=$(find "$MOUNT_DIR" -maxdepth 1 -name "*.app" | head -1)
          TEMP_APP="/tmp/$(basename "$APP_SRC")"
          cp -R "$APP_SRC" "$TEMP_APP"
          hdiutil detach "$MOUNT_DIR"

          # Ad-hoc 서명
          echo "Signing: $TEMP_APP"
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS" "$TEMP_APP"
          codesign --verify --deep "$TEMP_APP"

          # 서명된 앱으로 DMG 재생성
          rm "$DMG"
          hdiutil create \
            -volname "업무보고 아카이브" \
            -srcfolder "$TEMP_APP" \
            -ov -format UDZO \
            "$DMG"
          echo "Done: $DMG"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: '업무보고 아카이브 ${{ github.ref_name }}'
          body: |
            ## 설치 방법

            **macOS** (`_aarch64.dmg`)
            1. DMG 열고 앱을 Applications 폴더로 복사
            2. 처음 실행 시 Gatekeeper 경고가 뜨면 아래 중 하나로 우회:
               - Finder에서 앱 **오른쪽 클릭 → 열기 → 열기**
               - 시스템 설정 → 개인 정보 보호 및 보안 → **그래도 열기**
               - 터미널: `xattr -dr com.apple.quarantine /Applications/업무보고\ 아카이브.app`

            **Windows** (`.exe`)
            1. 설치 파일 실행
            2. "Windows의 PC 보호" 경고 시 **추가 정보 → 실행** 클릭
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: false
