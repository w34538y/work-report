name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: ''
          - os: windows-latest
            args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '업무보고 아카이브 ${{ github.ref_name }}'
          releaseBody: |
            ## 설치 방법

            **macOS** (`_aarch64.dmg`)
            1. DMG 열고 앱을 Applications 폴더로 복사
            2. 처음 실행 시 **오른쪽 클릭 → 열기** (미서명 앱 경고 우회)

            **Windows** (`.exe`)
            1. 설치 파일 실행
            2. "Windows의 PC 보호" 경고 시 **추가 정보 → 실행** 클릭
          releaseDraft: false
          prerelease: false
