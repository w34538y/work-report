name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$TAG\"/" src-tauri/tauri.conf.json

      - name: Build
        run: npm run tauri:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Ad-hoc sign & repackage DMG + updater tar.gz (macOS)
        if: runner.os == 'macOS'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ENTITLEMENTS="src-tauri/entitlements.mac.plist"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "DMG: $DMG"

          # DMG에서 .app 추출
          MOUNT_DIR=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -noverify
          APP_SRC=$(find "$MOUNT_DIR" -maxdepth 1 -name "*.app" | head -1)
          TEMP_APP="/tmp/$(basename "$APP_SRC")"
          cp -R "$APP_SRC" "$TEMP_APP"
          hdiutil detach "$MOUNT_DIR"

          # Ad-hoc 서명
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS" "$TEMP_APP"
          codesign --verify --deep "$TEMP_APP"

          # 서명된 앱으로 DMG 재생성
          rm "$DMG"
          hdiutil create \
            -volname "Work Reporter" \
            -srcfolder "$TEMP_APP" \
            -ov -format UDZO \
            "$DMG"

          # 업데이터용 tar.gz 재생성 (서명된 .app 기준)
          APP_NAME=$(basename "$TEMP_APP")
          PRODUCT="${APP_NAME%.app}"
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          TAR_FILE="${BUNDLE_DIR}/${PRODUCT}.app.tar.gz"
          tar -czf "$TAR_FILE" -C /tmp "$APP_NAME"

          # Tauri 업데이터 키로 서명
          npm run tauri -- signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TAR_FILE"

          echo "Done: $DMG | $TAR_FILE"

      - name: Create Windows updater zip & sign (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          EXE=$(find "$NSIS_DIR" -name "*-setup.exe" | head -1)
          EXE_BASENAME=$(basename "$EXE")
          ZIP_BASENAME="${EXE_BASENAME%.exe}.nsis.zip"
          ZIP_PATH="$NSIS_DIR/$ZIP_BASENAME"

          (cd "$NSIS_DIR" && 7z a "$ZIP_BASENAME" "$EXE_BASENAME")

          npm run tauri -- signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$ZIP_PATH"

          echo "Done: $ZIP_PATH"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p upload
          # macOS
          cp src-tauri/target/release/bundle/dmg/*.dmg        upload/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/macos/*.tar.gz   upload/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/macos/*.tar.gz.sig upload/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*-setup.exe upload/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.zip       upload/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.zip.sig   upload/ 2>/dev/null || true
          ls -lh upload/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: upload/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundle-macOS
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundle-Windows
          path: artifacts/win

      - name: Generate latest.json
        shell: bash
        run: |
          export TAG=${GITHUB_REF_NAME}
          export REPO="w34538y/work-report"

          export MAC_TAR=$(find artifacts/mac -name "*.app.tar.gz" | head -1)
          export WIN_ZIP=$(find artifacts/win -name "*.zip" | grep -v "\.sig" | head -1)

          if [ -z "$MAC_TAR" ]; then echo "ERROR: macOS tar.gz not found"; exit 1; fi
          if [ -z "$WIN_ZIP" ]; then echo "ERROR: Windows zip not found"; exit 1; fi
          if [ ! -f "${MAC_TAR}.sig" ]; then echo "ERROR: macOS sig not found"; exit 1; fi
          if [ ! -f "${WIN_ZIP}.sig" ]; then echo "ERROR: Windows sig not found"; exit 1; fi

          python3 .github/scripts/gen_latest_json.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Work Reporter ${{ github.ref_name }}'
          body: |
            ## 설치 방법

            **macOS** (`_aarch64.dmg`)
            1. DMG 열고 앱을 Applications 폴더로 복사
            2. 처음 실행 시 Gatekeeper 경고가 뜨면 아래 중 하나로 우회:
               - Finder에서 앱 **오른쪽 클릭 → 열기 → 열기**
               - 시스템 설정 → 개인 정보 보호 및 보안 → **그래도 열기**
               - 터미널: `xattr -dr com.apple.quarantine /Applications/Work\ Reporter.app`

            **Windows** (`.exe`)
            1. 설치 파일 실행
            2. "Windows의 PC 보호" 경고 시 **추가 정보 → 실행** 클릭

            > 이미 설치된 경우 앱 실행 시 자동으로 업데이트 알림이 표시됩니다.
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*-setup.exe
            latest.json
          fail_on_unmatched_files: false
