name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$TAG\"/" src-tauri/tauri.conf.json

      - name: Build
        run: npm run tauri:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign & repackage DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          ENTITLEMENTS="src-tauri/entitlements.mac.plist"
          echo "Signing: $APP"
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS" "$APP"
          codesign --verify --deep "$APP"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          rm "$DMG"
          hdiutil create \
            -volname "업무보고 아카이브" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG"
          echo "DMG: $DMG"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: '업무보고 아카이브 ${{ github.ref_name }}'
          body: |
            ## 설치 방법

            **macOS** (`_aarch64.dmg`)
            1. DMG 열고 앱을 Applications 폴더로 복사
            2. 처음 실행 시 **오른쪽 클릭 → 열기** 선택

            **Windows** (`.exe`)
            1. 설치 파일 실행
            2. "Windows의 PC 보호" 경고 시 **추가 정보 → 실행** 클릭
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: false
